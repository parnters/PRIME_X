<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:linear-gradient(135deg,#000000,#111111,#1b1b1b,#000000);
    background-size:400% 400%;
    animation:bgMove 12s ease infinite;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.box{
    width:340px;
    background:rgba(17,17,17,.95);
    border:2px solid gold;
    border-radius:18px;
    padding:30px;
    text-align:center;
    box-shadow:0 0 30px rgba(255,215,0,.45);
}
.logo{
    width:120px;
    margin-bottom:15px;
    filter:drop-shadow(0 0 15px gold);
}
h2{
    color:gold;
    margin-bottom:15px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid gold;
    background:#000;
    color:gold;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:gold;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#f5c400;
}
</style>

</head>

<body>

<div class="box">

<img src="https://i.ibb.co/PsnXhzGc/47825.png" class="logo" alt="PRIME-X Logo">

<h2>LOGIN</h2>

<input type="text" id="user" placeholder="Enter Username">
<input type="password" id="pass" placeholder="Enter Password">

<button onclick="login()">LOGIN</button>

</div>

<script>
function login(){

var user = document.getElementById("user").value.trim();
var pass = document.getElementById("pass").value.trim();

if(
    (
        user === "2001" ||
        user === "2002" ||
        user === "2003" ||
        user === "2004" ||
        user === "2005" ||
        user === "2006" ||
        user === "2007" ||
        user === "2008" ||
        user === "2009" ||
        user === "2010" ||
        user === "2011" ||
        user === "2012"
    )
    && pass === "prime@admin00"
){
    alert("Login Successful");
    window.location.href = "dashboard.html";
}else{
    alert("Invalid Username or Password");
}

}
</script>

</body>
</html>
